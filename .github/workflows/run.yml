name: Gunluk Kripto Botu

on:
  workflow_dispatch: # Manuel tetikleme icin

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bagimliliklari Yukle
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas feedparser

    - name: Analiz Raporunu Hazirla
      # Bu adim sadece analizi hazirlayip hafizaya alacak, Telegram'a gondermeyecek
      run: |
        python bot.py > rapor.txt

    - name: Hazir Telegram Aksiyonu ile Mesaj At
      # Dunyanin en populer hazir Telegram aksiyonunu kullaniyoruz, sifre problemini kökten cozüyor
      uses: appleboy/telegram-action@master
      with:
        to: "-1003953455562"
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message_file: rapor.txt
        format: html
