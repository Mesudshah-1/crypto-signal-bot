name: Daily Crypto Bot

on:
  schedule:
    # Türkiye saatiyle (TSİ) her sabah 09:00'da çalışır (UTC 06:00).
    - cron: '0 6 * * *'
  workflow_dispatch: # Manuel çalıştırma butonunu aktif eder.

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4.2.2 # Tam sürüm belirtilerek Node güncelliği sağlandı

    - name: Python Kurulumu
      uses: actions/setup-python@v5.3.0 # En güncel Node altyapısına sahip sürüm
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Botu Çalıştır
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python bot.py
