name: Debug Bot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show environment
        run: env

      - name: List files
        run: ls -R

      - name: Python version
        run: python --version

      - name: Install deps
        run: pip install requests feedparser

      - name: Run bot
        run: python bot.py
