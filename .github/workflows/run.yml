name: SYSTEM TEST

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: CHECKOUT
        uses: actions/checkout@v4

      - name: SHOW DIRECTORY
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== FILES ==="
          ls -R

      - name: CHECK PYTHON
        run: |
          python --version
          which python

      - name: TEST PYTHON RUN
        run: |
          echo 'print("HELLO FROM ACTIONS")' > test.py
          python test.py
