name: FULL DEBUG BOT

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show directory
        run: pwd

      - name: List all files
        run: find .

      - name: Python version
        run: python --version

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run bot with error output
        run: python -u bot.py
